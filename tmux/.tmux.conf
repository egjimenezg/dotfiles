# Set the prefix from Ctrl-b to Ctrl-a
set -g prefix C-a

# Free Ctrl-b keybinding
unbind C-b

# Set delay between prefix and command
set -s escape-time 1

# Set the base index for windows to 1 instead of 0
set -g base-index 1

# Set the base index for panes to 1 instead of 0
set -w -g pane-base-index 1

# Reload configuration with Prefix r
bind r source-file ~/.tmux.conf \; display-message "Configuration reloaded"

# Ensure that we can send Ctrl-A to other apps
bind C-a send-prefix

# Split panes with | and -
bind | split-window -h
bind - split-window -v

# Move between panes using h,j,k,l keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Cycle through the windows
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Change size of panes with Prefix H,J,K,L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Mouse support - set to on if you want to use the mouse
set -g mouse off

# Set the default terminal mode to 256color mode
set -g default-terminal "tmux-256color"
set -g default-terminal "screen-256color"

set -a terminal-overrides ",*256col*:RGB"

# Set the status line's colors
set -g status-style fg=white,bold,bg=black

# Set the color of the window list
set -g window-status-style fg=cyan,bg=colour68
# Set color for the active window
set -g window-status-current-style fg=white,bold,bg=colour196,bright

# Colors for pane borders
set -w -g pane-border-style fg=green,bg=black
set -w -g pane-active-border-style fg=black,bg=yellow

set -w -g pane-border-lines heavy

# Add indicators for two-pane setup
set -g pane-border-indicators arrows

# Add status to panes
set -g pane-border-status top

# Set styles for active window
# Active pane normal, other shaded out
set -g window-style fg=color240,bg=color235
set -g window-active-style fg=white,bg=black

# Command / message line
set -g message-style fg=white,bg=color242,bold

set -g status-left-length 50
set -g status-left "#[fg=green]Session: #S #[fg=yellow]Window: #I #W #[fg=cyan]Pane #P "

# Status line right side
set -g status-right "#[fg=cyan]%d %b %R"

# Center the window list in the status line
set -g status-justify centre

# Update the status line every sixty seconds
set -g status-interval 60

# Enable activity alerts
set -w -g monitor-activity on
set -w -g visual-activity on

